name: SQL tests (migrations + specs)

on:
  push:
    branches: [master]
  pull_request:

# Cancel in-flight runs of the same ref when a new push lands.
concurrency:
  group: pgtap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sql-specs:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: folio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: folio_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client + pgTAP
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client postgresql-16-pgtap

      - name: Bootstrap Supabase-compatible roles + auth schema stubs
        run: |
          # Folio · stubs minimos para correr migrations de Supabase contra
          # postgres vanilla. NO replica el comportamiento real de Supabase
          # Auth — solo crea los simbolos que las migrations referencian.
          # Esto es defensa contra drift de schema, NO un sustituto del
          # test E2E con `supabase start`.
          psql <<'SQL'
            CREATE ROLE anon NOLOGIN;
            CREATE ROLE authenticated NOLOGIN;
            CREATE ROLE service_role NOLOGIN BYPASSRLS;
            CREATE SCHEMA IF NOT EXISTS auth;
            CREATE TABLE IF NOT EXISTS auth.users (
              id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
              email text,
              raw_user_meta_data jsonb DEFAULT '{}'::jsonb,
              email_confirmed_at timestamptz,
              created_at timestamptz DEFAULT now()
            );
            -- auth.uid()/role() retornan NULL en CI (no hay JWT real). Esto
            -- significa que policies RLS que filtran por auth.uid() devuelven
            -- 0 rows — los tests deben usar SECURITY DEFINER o setear locally
            -- las row-level checks via overrides.
            CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
            CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE AS $$ SELECT current_setting('request.jwt.claim.role', true) $$;
            CREATE OR REPLACE FUNCTION auth.jwt() RETURNS jsonb LANGUAGE sql STABLE AS $$ SELECT '{}'::jsonb $$;
            -- Storage schema stub (M27 references storage.objects).
            CREATE SCHEMA IF NOT EXISTS storage;
            CREATE TABLE IF NOT EXISTS storage.buckets (
              id text PRIMARY KEY,
              name text,
              public boolean DEFAULT false,
              file_size_limit bigint,
              allowed_mime_types text[]
            );
            CREATE TABLE IF NOT EXISTS storage.objects (
              id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
              bucket_id text REFERENCES storage.buckets(id),
              name text,
              owner uuid,
              metadata jsonb
            );
          SQL

      - name: Apply migrations in lexicographic order
        run: |
          # Skip migrations that touch infra Supabase-only (storage policies
          # need storage.objects owner = supabase_storage_admin). Estos las
          # corre supabase start localmente, no este CI.
          set -e
          for f in supabase/migrations/*.sql; do
            echo "::group::Applying $(basename "$f")"
            # check_function_bodies off para que pl/pgsql se acepte aun si
            # referencia objetos que no existen hasta la migration siguiente.
            psql -v ON_ERROR_STOP=1 -c "SET check_function_bodies = off;" -f "$f" || {
              echo "::error file=$f::Migration failed"
              exit 1
            }
            echo "::endgroup::"
          done

      - name: Run SQL specs (tests/sql/*.spec.sql)
        run: |
          set -e
          for f in tests/sql/*.spec.sql; do
            echo "::group::Spec $(basename "$f")"
            psql -v ON_ERROR_STOP=1 -f "$f" || {
              echo "::error file=$f::Spec failed"
              exit 1
            }
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          echo "## SQL tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Migrations applied: $(ls supabase/migrations/*.sql | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Specs ejecutados: $(ls tests/sql/*.spec.sql | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "NOTA: este CI usa postgres:16 vanilla + stubs minimos de" >> "$GITHUB_STEP_SUMMARY"
          echo "auth/storage. NO reemplaza un test E2E con \`supabase start\`," >> "$GITHUB_STEP_SUMMARY"
          echo "que sigue siendo la fuente de verdad para RLS-with-JWT y" >> "$GITHUB_STEP_SUMMARY"
          echo "storage policies." >> "$GITHUB_STEP_SUMMARY"
